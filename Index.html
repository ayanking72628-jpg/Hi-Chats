                  // Mark as read logic
                  if (val.sender !== currentUser.uid && !val.read) {
                      updates[`messages/${chatId}/${c.key}/read`] = true;
                  }
               });
               
               if(Object.keys(updates).length > 0) update(ref(db), updates);
               setRawMsgs(data);
            });
            
            // Only update typing status if NOT blocked
            onValue(ref(db, `typing/${chatId}/${user.uid}`), snap => {
                if(!isBlocked) setIsTyping(snap.val());
                else setIsTyping(false);
            });
            
            return () => off(msgRef);
          }, [chatId, isBlocked]); // Dependency on isBlocked to refresh typing logic

          // Derived state: Filter messages based on clearedAt timestamp
          const msgs = rawMsgs.filter(m => m.timestamp > clearedAt);

          // Scroll to bottom when new messages arrive (unless in selection mode)
          useEffect(() => {
             if (!isSelectionMode && msgs.length > 0) {
                 setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
             }
          }, [msgs.length, isSelectionMode]);

          // Reset selection mode if chat closes
          useEffect(() => {
             if(!chatId) {
                setIsSelectionMode(false);
                setSelectedMsgIds([]);
                setShowClearModal(false);
                setShowBlockModal(false);
                setShowUnblockModal(false);
                setIsMsgSearchOpen(false);
                setIsCalendarOpen(false);
             }
          }, [chatId]);

          const handleBlockConfirm = () => {
             set(ref(db, `blocked/${currentUser.uid}/${user.uid}`), true);
             // Clear typing status so they don't see us typing
             set(ref(db, `typing/${chatId}/${currentUser.uid}`), false);
             setShowBlockModal(false);
             setIsMenuOpen(false);
          };

          const handleUnblockConfirm = () => {
             set(ref(db, `blocked/${currentUser.uid}/${user.uid}`), null);
             setShowUnblockModal(false);
             setIsMenuOpen(false);
          };

          const sendText = () => {
             if(isBlocked) return; // Prevent sending if blocked
             if(!input.trim()) return;
             push(ref(db, `messages/${chatId}`), { 
                 text: input.trim(), 
                 sender: currentUser.uid, 
                 timestamp: serverTimestamp(),
                 read: false 
             });
             get(ref(db, `unreadCounts/${user.uid}/${chatId}`)).then(snap => set(ref(db, `unreadCounts/${user.uid}/${chatId}`), (snap.val() || 0) + 1));
             setInput('');
          };

          const handleJumpToMessage = (msgId) => {
             setIsMsgSearchOpen(false);
             setHighlightedMsgId(msgId);
             setTimeout(() => {
                 const el = document.getElementById(`msg-${msgId}`);
                 if(el) el.scrollIntoView({behavior: 'smooth', block: 'center'});
             }, 300);
             setTimeout(() => setHighlightedMsgId(null), 2500);
          };

          // --- Chunked File Upload Logic ---
          const CHUNK_LIMIT = 500 * 1024; // 500KB chunks for safety
          
          const handleFileUpload = async (e, type) => {
              if(isBlocked) return;
              const file = e.target.files?.[0];
              if (!file) return;

              e.target.value = ''; // Reset input to allow re-selection

              const reader = new FileReader();
              reader.onload = async () => {
                  const base64Data = reader.result;
                  
                  // Check if file is large (> 1MB), then chunk it
                  if (base64Data.length > 1000000) {
                      const fileId = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                      const chunks = [];
                      const totalLength = base64Data.length;
                      
                      // Split into chunks
                      for (let i = 0; i < totalLength; i += CHUNK_LIMIT) {
                          chunks.push(base64Data.substring(i, i + CHUNK_LIMIT));
                      }

                      // Upload chunks to fileChunks path
                      try {
                          await Promise.all(chunks.map((chunk, idx) => {
                              return set(ref(db, `fileChunks/${fileId}/${idx}`), chunk);
                          }));

                          // Send message metadata
                          const messageData = {
                              sender: currentUser.uid,
                              timestamp: serverTimestamp(),
                              read: false,
                              isChunked: true,
                              fileId: fileId,
                              chunkCount: chunks.length,
                              fileType: type, // 'image' or 'video'
                              fileName: file.name
                          };
                          push(ref(db, `messages/${chatId}`), messageData);
                      } catch (err) {
                          console.error("Upload failed", err);
                          alert("Failed to upload file. Please try again.");
                      }
                  } else {
                      // Standard upload for smaller files
                      const messageData = {
                          sender: currentUser.uid,
                          timestamp: serverTimestamp(),
                          read: false,
                      };

                      if (type === 'file') {
                          messageData.fileUrl = base64Data;
                          messageData.fileName = file.name;
                      } else if (type === 'image') {
                          messageData.imageUrl = base64Data;
                      } else if (type === 'video') {
                          messageData.videoUrl = base64Data;
                      }

                      push(ref(db, `messages/${chatId}`), messageData);
                  }
                  setIsAttachMenuOpen(false);
              };
              reader.readAsDataURL(file);
          };

          const startRecording = async () => {
            if(isBlocked) return;
            try {
              if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                  throw new Error("Secure context required (HTTPS/localhost)");
              }
              const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
              mediaRecorderRef.current = new MediaRecorder(stream);
              audioChunksRef.current = [];
              
              mediaRecorderRef.current.ondataavailable = (event) => {
                if(event.data.size > 0) audioChunksRef.current.push(event.data);
              };
              
              mediaRecorderRef.current.onstop = async () => {
                const mimeType = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : 
                                 (MediaRecorder.isTypeSupported("audio/mp4") ? "audio/mp4" : "");
                const options = mimeType ? { type: mimeType } : undefined;
                const audioBlob = new Blob(audioChunksRef.current, options);
                
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => {
                     const base64Audio = reader.result;
                     const durationMs = Date.now() - recordingStartRef.current;
                     const totalSeconds = Math.max(1, Math.round(durationMs / 1000));
                     const mins = Math.floor(totalSeconds / 60);
                     const secs = totalSeconds % 60;
                     const durStr = `${mins}:${secs.toString().padStart(2, '0')}`;
                     
                     push(ref(db, `messages/${chatId}`), {
                        audioUrl: base64Audio,
                        duration: durStr,
                        sender: currentUser.uid,
                        timestamp: serverTimestamp(),
                        played: false,
                        read: false
                     });
                     setRecordingTime(0);
                };
              };
              recordingStartRef.current = Date.now();
              mediaRecorderRef.current.start();
              setIsRecording(true);
              setRecordingTime(0);
              timerRef.current = setInterval(() => {
                  const elapsed = Math.floor((Date.now() - recordingStartRef.current) / 1000);
                  setRecordingTime(elapsed);
              }, 1000);
            } catch(e) { 
               console.error(e);
               alert("Mic access denied.");
            }
          };

          const stopRecording = () => {
             if(mediaRecorderRef.current && isRecording) {
                mediaRecorderRef.current.stop();
                mediaRecorderRef.current.stream.getTracks().forEach(t => t.stop());
                setIsRecording(false);
                clearInterval(timerRef.current);
             }
          };

          // --- Audio Player Logic ---
          const handleAudioClick = (url, id) => {
            if (isSelectionMode) return; 

            if (currentAudio && currentAudio.id === id) {
                if (currentAudio.audioObj.paused) {
                    currentAudio.audioObj.play();
                    setPlayingAudioId(id); 
                } else {
                    currentAudio.audioObj.pause();
                    setPlayingAudioId(null); 
                }
                return;
            }
            if (currentAudio && currentAudio.audioObj) {
                currentAudio.audioObj.pause();
                currentAudio.audioObj.onended = null;
                currentAudio.audioObj.ontimeupdate = null;
            }
            const newAudio = new Audio(url);
            newAudio.currentTime = 0;
            newAudio.ontimeupdate = () => {
                if(newAudio.duration) {
                    setAudioProgress((newAudio.currentTime / newAudio.duration) * 100);
                }
            };
            newAudio.onended = () => {
                setPlayingAudioId(null);
                setAudioProgress(0);
            };
            newAudio.play().catch(e => console.log("Playback failed", e));
            setCurrentAudio({ id, audioObj: newAudio });
            setPlayingAudioId(id);
            update(ref(db, `messages/${chatId}/${id}`), { played: true });
          };

          const handleSeek = (e, id) => {
            if (isSelectionMode) return;
            const val = parseFloat(e.target.value);
            setAudioProgress(val);
            if (currentAudio && currentAudio.id === id && currentAudio.audioObj.duration) {
                 const newTime = (val / 100) * currentAudio.audioObj.duration;
                 currentAudio.audioObj.currentTime = newTime;
            }
          };

          // --- Selection Logic ---
          const toggleSelection = (msgId) => {
             if(selectedMsgIds.includes(msgId)) {
                setSelectedMsgIds(prev => prev.filter(id => id !== msgId));
             } else {
                setSelectedMsgIds(prev => [...prev, msgId]);
             }
          };

          const handleDeleteSelected = () => {
             if(selectedMsgIds.length === 0) return;
             selectedMsgIds.forEach(id => {
                 set(ref(db, `messages/${chatId}/${id}`), null);
             });
             setSelectedMsgIds([]);
             setIsSelectionMode(false);
          };

          const handleStarSelected = () => {
             if(selectedMsgIds.length === 0) return;
             const firstMsg = msgs.find(m => m.id === selectedMsgIds[0]);
             const newState = !firstMsg?.starred;
             
             const updates = {};
             selectedMsgIds.forEach(id => {
                 updates[`messages/${chatId}/${id}/starred`] = newState;
             });
             update(ref(db), updates);
             setSelectedMsgIds([]);
             setIsSelectionMode(false);
          };

          const handleCopySelected = () => {
             if(selectedMsgIds.length === 0) return;
             const textToCopy = selectedMsgIds.map(id => {
                const m = msgs.find(msg => msg.id === id);
                return m?.text || "";
             }).filter(t => t).join("\n");
             
             if(textToCopy) {
                navigator.clipboard.writeText(textToCopy);
             }
             setSelectedMsgIds([]);
             setIsSelectionMode(false);
          };
          
          const handleClearChatConfirm = () => {
              if (clearMedia) {
                  set(ref(db, `messages/${chatId}`), null);
              } else {
                  set(ref(db, `userChats/${currentUser.uid}/${chatId}/clearedAt`), serverTimestamp());
              }
              setShowClearModal(false);
              setIsMenuOpen(false);
          };

          const renderAudioBubble = (m) => {
              const isMe = m.sender === currentUser.uid;
              const dp = isMe ? myProfile.dpUrl : user.dpUrl;
              const isPlaying = playingAudioId === m.id;
              const playedColor = m.played ? 'text-blue-500' : 'text-green-500';
              const isCurrent = currentAudio && currentAudio.id === m.id;
              const progress = isCurrent ? audioProgress : 0;
              
              return (
                <div className={`flex items-center gap-3 min-w-[240px] ${isMe ? 'flex-row-reverse' : 'flex-row'}`}>
                   <div className="relative">
                     <img src={dp} className="w-12 h-12 rounded-full bg-gray-900 object-cover" />
                     <div className={`absolute bottom-0 right-0 ${playedColor} bg-container rounded-full p-0.5`}>
                       <MicIcon /> 
                     </div>
                   </div>
                   
                   <button onClick={() => m.audioUrl && m.id && handleAudioClick(m.audioUrl, m.id)} className="z-10 text-secondary hover:text-primary transition-colors">
                      {isPlaying ? <PauseIcon /> : <PlayIcon />}
                   </button>

                   <div className="flex flex-col flex-1 gap-1">
                      <input 
                         type="range" 
                         min="0" 
                         max="100" 
                         value={progress} 
                         onChange={(e) => handleSeek(e, m.id)}
                         disabled={isSelectionMode}
                         className="w-full h-1 bg-gray-500 rounded-lg appearance-none cursor-pointer accent-[#00a884]"
                      />
                      <span className="text-xs text-secondary ml-1">{m.duration || "0:00"}</span>
                   </div>
                </div>
              );
          };
          
          const renderMessageContent = (m) => {
              if (m.audioUrl) return renderAudioBubble(m);
              // Chunked or Standard Image/Video Handling via AsyncMedia
              if (m.isChunked || m.imageUrl || m.videoUrl) {
                  return (
                      <AsyncMedia 
                          message={m} 
                          isSelectionMode={isSelectionMode} 
                          onViewImage={(url) => {
                              setViewingImage(url); 
                              setImageZoom(1);
                          }} 
                      />
                  );
              }
              if (m.fileUrl) return (
                  <div className="flex items-center gap-3 p-2 bg-black/20 rounded-lg">
                     <div className="text-purple-400"><DocumentIcon /></div>
                     <span className="text-sm truncate max-w-[150px]">{m.fileName || "Document"}</span>
                     {!isSelectionMode && (
                        <a href={m.fileUrl} download={m.fileName || "file"} className="p-2 hover:bg-white/10 rounded-full">
                            <DownloadIcon />
                        </a>
                     )}
                  </div>
              );
              return m.text;
          }

          // Header Logic
          const renderHeader = () => {
             if (isSelectionMode) {
                const count = selectedMsgIds.length;
                return (
                   <div className="flex items-center justify-between p-2 bg-container shadow-sm z-30 text-primary w-full h-[60px]">
                      <div className="flex items-center gap-4">
                         <button onClick={() => { setIsSelectionMode(false); setSelectedMsgIds([]); }} className="p-2 text-secondary hover:text-primary">✕</button>
                         <span className="font-bold text-lg">{count} selected</span>
                      </div>
                      <div className="flex items-center gap-4 mr-2">
                         <button onClick={handleDeleteSelected} disabled={count === 0} className={`p-2 rounded-full ${GRADIENT_CLASS} shadow-lg active:scale-95 transition-transform`}><TrashIcon className="w-5 h-5 text-white" /></button>
                         <button onClick={handleStarSelected} disabled={count === 0} className={`p-2 rounded-full ${GRADIENT_CLASS} shadow-lg active:scale-95 transition-transform`}><StarIcon className="w-5 h-5 text-white" /></button>
                         <button onClick={handleCopySelected} disabled={count === 0} className={`p-2 rounded-full ${GRADIENT_CLASS} shadow-lg active:scale-95 transition-transform`}><CopyIcon className="w-5 h-5 text-white" /></button>
                      </div>
                   </div>
                );
             }
             return (
               <div className="flex items-center p-2 bg-container shadow-sm z-30 text-primary w-full h-[60px]">
                  <button onClick={onClose} className="text-xl mr-2 text-primary p-2">←</button>
                  <img src={user.dpUrl} className="w-9 h-9 rounded-full mr-3 bg-gray-700 object-cover" />
                  <div className="flex-1 cursor-pointer">
                     <div className="font-semibold text-base">{user.name}</div>
                     <div className="text-xs text-secondary">{isTyping ? 'typing...' : user.status}</div>
                  </div>
                  <div className="flex items-center gap-4 mr-2">
                     {/* Disable calls if blocked */}
                     <button onClick={() => !isBlocked && onCall(true)} className={`p-1 ${isBlocked ? 'opacity-30 cursor-not-allowed' : ''}`}><VideoIcon /></button>
                     <button onClick={() => !isBlocked && onCall(false)} className={`p-1 ${isBlocked ? 'opacity-30 cursor-not-allowed' : ''}`}><PhoneIcon /></button>
                     <button onClick={() => setIsMsgSearchOpen(true)} className="p-1"><SearchIcon /></button>
                     <div className="relative">
                        <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-1"><MenuIcon /></button>
                        {isMenuOpen && (
                          <div className="absolute right-0 top-10 w-48 bg-container shadow-xl rounded-md py-2 text-primary z-50 border border-gray-700 animate-scaleIn">
                            <div className="px-4 py-2 hover:bg-background cursor-pointer text-sm" onClick={() => { setIsSelectionMode(true); setIsMenuOpen(false); }}>Select messages</div>
                            <div className="px-4 py-2 hover:bg-background cursor-pointer text-sm" onClick={() => { setShowClearModal(true); setIsMenuOpen(false); }}>Clear chat</div>
                            {/* Toggle Block/Unblock based on state */}
                            {isBlocked ? (
                                <div className="px-4 py-2 hover:bg-background cursor-pointer text-sm" onClick={() => { setShowUnblockModal(true); setIsMenuOpen(false); }}>Unblock</div>
                            ) : (
                                <div className="px-4 py-2 hover:bg-background cursor-pointer text-sm" onClick={() => { setShowBlockModal(true); setIsMenuOpen(false); }}>Block</div>
                            )}
                          </div>
                        )}
                     </div>
                  </div>
               </div>
             );
          };

          return (
            <div className="absolute inset-0 bg-background z-40 flex flex-col bg-[url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')] bg-repeat bg-contain">
               <div className="absolute inset-0 bg-background/90 z-0 pointer-events-none"></div>

               {/* HEADER */}
               {renderHeader()}

               {/* Custom Calendar Modal */}
               <CustomCalendar 
                  isOpen={isCalendarOpen} 
                  onClose={() => setIsCalendarOpen(false)}
                  onSelect={(dateStr) => setMsgSearchDate(dateStr)}
                  minDate={minDate}
                  maxDate={maxDate}
               />

               {/* Search Messages Modal */}
               {isMsgSearchOpen && (
                 <div className="absolute inset-0 z-50 bg-[#111b21] flex flex-col animate-scaleIn">
                   <div className="flex items-center gap-2 p-2 border-b border-gray-700 bg-container">
                      <button onClick={() => { setIsMsgSearchOpen(false); setMsgSearchTerm(''); setMsgSearchDate(''); }} className="p-2 text-secondary hover:text-primary">
                        <span className="text-xl">←</span>
                      </button>
                      <div className="flex-1 bg-inputPill rounded-lg flex items-center px-3 py-1.5">
                         <SearchIcon />
                         <input 
                           autoFocus
                           className="flex-1 bg-transparent border-none outline-none text-primary ml-2 text-sm placeholder-secondary"
                           placeholder="Search..."
                           value={msgSearchTerm}
                           onChange={e => setMsgSearchTerm(e.target.value)}
                         />
                      </div>
                      <div className="relative">
                         <button className={`p-2 ${msgSearchDate ? 'text-accent' : 'text-secondary'}`} onClick={() => setIsCalendarOpen(true)}>
                            <CalendarIcon />
                         </button>
                      </div>
                   </div>
                   
                   <div className="flex-1 overflow-y-auto">
                      {msgSearchDate && <div className="p-4 bg-black/20 text-secondary text-sm text-center">Messages from {msgSearchDate}</div>}
                      {msgs.slice().reverse().filter(m => {
                         const d = new Date(m.timestamp);
                         if(msgSearchDate) {
                            const yyyy = d.getFullYear();
                            const mm = String(d.getMonth() + 1).padStart(2, '0');
                            const dd = String(d.getDate()).padStart(2, '0');
                            if(`${yyyy}-${mm}-${dd}` !== msgSearchDate) return false;
                         }
                         if(!msgSearchTerm) return true;
                         const term = msgSearchTerm.toLowerCase();
                         const textMatch = m.text && m.text.toLowerCase().includes(term);
                         const timeStr = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true}).toLowerCase();
                         const timeStr24 = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
                         
                         return textMatch || timeStr.includes(term) || timeStr24.includes(term);
                      }).map(m => {
                         const isMe = m.sender === currentUser.uid;
                         const d = new Date(m.timestamp);
                         return (
                            <div key={m.id} onClick={() => handleJumpToMessage(m.id)} className="p-4 border-b border-gray-800 cursor-pointer hover:bg-white/5 flex flex-col gap-1">
                                <div className="flex justify-between items-center text-xs text-secondary">
                                   <span>{d.toLocaleDateString()} {d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                   <span className={isMe ? "text-accent" : "text-blue-400"}>{isMe ? "You" : user.name}</span>
                                </div>
                                <div className="text-sm text-primary line-clamp-2">
                                   {m.text || (m.audioUrl ? "🎤 Voice Message" : m.imageUrl ? "📷 Photo" : m.videoUrl ? "🎥 Video" : "📁 File")}
                                </div>
                            </div>
                         )
                      })}
                      {msgs.length > 0 && msgs.filter(m => m.text?.toLowerCase().includes(msgSearchTerm.toLowerCase())).length === 0 && msgSearchTerm && (
                          <div className="p-10 text-center text-secondary">No messages found.</div>
                      )}
                   </div>
                 </div>
               )}
               
               {/* Messages List */}
               <div className="flex-1 overflow-y-auto p-4 z-10 flex flex-col gap-1">
                  {msgs.map((m, i) => {
                     const isMe = m.sender === currentUser.uid;
                     const date = new Date(m.timestamp);
                     const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true});
                     const isRead = m.read || false; 
                     const isSelected = selectedMsgIds.includes(m.id);
                     
                     const prev = msgs[i-1];
                     const showDate = !prev || (m.timestamp - prev.timestamp > 3600000); 

                     return (
                       <React.Fragment key={m.id || i}>
                         {showDate && (
                            <div className="flex justify-center my-3">
                               <span className="bg-container text-secondary text-xs px-2 py-1 rounded shadow-sm">{date.toLocaleDateString()}</span>
                            </div>
                         )}
                         <div 
                           id={`msg-${m.id}`}
                           onClick={() => isSelectionMode && toggleSelection(m.id)}
                           className={`flex w-full transition-colors duration-200 ${isSelectionMode ? 'cursor-pointer hover:bg-white/5' : ''} ${isSelected ? 'bg-[#00a884]/20 -mx-4 px-4 py-1' : 'py-0.5'}`}
                         >
                            {/* Checkbox for Selection Mode */}
                            {isSelectionMode && (
                               <div className="flex items-center justify-center mr-3 pointer-events-none">
                                  <input 
                                     type="checkbox" 
                                     className="custom-checkbox" 
                                     checked={isSelected}
                                     readOnly
                                  />
                               </div>
                            )}

                            <div className={`flex flex-1 ${isMe ? 'justify-end' : 'justify-start'} ${highlightedMsgId === m.id ? 'bg-[#00a884]/30 rounded-lg p-1' : ''}`}>
                                <div className={`max-w-[80%] rounded-lg shadow-sm ${isMe ? 'bg-bubbleMe rounded-tr-none' : 'bg-bubbleOther rounded-tl-none'} ${isSelected ? 'opacity-80' : ''}`}>
                                    <div className="px-2 pt-2 pb-1 text-sm text-primary flex flex-col">
                                      <span className="break-words leading-relaxed">{renderMessageContent(m)}</span>
                                      <div className="self-end text-[10px] text-gray-400 flex items-center gap-1 ml-2 select-none mt-1">
                                        {m.starred && <StarFilledIcon className="text-[#FFD700] drop-shadow-md" />}
                                        {timeStr}
                                        {isMe && <span className={`${isRead ? 'text-blue-400' : 'text-gray-400'}`}>✓✓</span>}
                                      </div>
                                    </div>
                                </div>
                            </div>
                         </div>
                       </React.Fragment>
                     );
                  })}
                  <div ref={bottomRef} />
               </div>

               {/* Clear Chat Modal */}
               {showClearModal && (
                 <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-scaleIn">
                    <div className="bg-container rounded-xl p-6 w-full max-w-sm border border-gray-700 shadow-2xl">
                       <h3 className="text-xl font-semibold mb-4 text-primary">Clear this chat?</h3>
                       <p className="text-sm text-secondary mb-4">This chat will be empty but will remain in your chat list.</p>
                       <div className="flex items-center gap-3 mb-8 cursor-pointer" onClick={() => setClearMedia(!clearMedia)}>
                          <input type="checkbox" className="custom-checkbox" checked={clearMedia} readOnly />
                          <span className="text-sm text-primary">Also delete media received in this chat from the device gallery</span>
                       </div>
                       <div className="flex justify-end gap-4">
                          <button onClick={() => setShowClearModal(false)} className="px-4 py-2 text-[#00a884] font-medium border border-[#00a884] rounded-lg hover:bg-[#00a884]/10 transition-colors">Cancel</button>
                          <button onClick={handleClearChatConfirm} className={`${GRADIENT_CLASS} px-4 py-2 rounded-lg text-white font-medium`}>Clear chat</button>
                       </div>
                    </div>
                 </div>
               )}

               {/* Block User Modal */}
               {showBlockModal && (
                 <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-scaleIn">
                    <div className="bg-container rounded-xl p-6 w-full max-w-sm border border-gray-700 shadow-2xl">
                       <div className="flex items-center gap-2 mb-4 text-primary">
                          <BlockIcon className="w-6 h-6 text-red-500" />
                          <h3 className="text-xl font-semibold">Block {user.name}?</h3>
                       </div>
                       <p className="text-sm text-secondary mb-6">{user.name} will not be able to send you messages or call you. This contact will not be notified.</p>
                       <div className="flex justify-end gap-4">
                          <button onClick={() => setShowBlockModal(false)} className="px-4 py-2 text-[#00a884] font-medium border border-[#00a884] rounded-lg hover:bg-[#00a884]/10 transition-colors">Cancel</button>
                          <button onClick={handleBlockConfirm} className="px-4 py-2 rounded-lg text-white font-medium bg-red-500 hover:bg-red-600 transition-colors shadow-lg">Block</button>
                       </div>
                    </div>
                 </div>
               )}

               {/* Unblock User Modal */}
               {showUnblockModal && (
                 <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-scaleIn">
                    <div className="bg-container rounded-xl p-6 w-full max-w-sm border border-gray-700 shadow-2xl">
                       <h3 className="text-xl font-semibold mb-6 text-primary">Unblock {user.name}?</h3>
                       <div className="flex justify-end gap-4">
                          <button onClick={() => setShowUnblockModal(false)} className="px-4 py-2 text-[#00a884] font-medium border border-[#00a884] rounded-lg hover:bg-[#00a884]/10 transition-colors">Cancel</button>
                          <button onClick={handleUnblockConfirm} className={`${GRADIENT_CLASS} px-4 py-2 rounded-lg text-white font-medium`}>Unblock</button>
                       </div>
                    </div>
                 </div>
               )}

               {/* Standard Footer - Hidden in Selection Mode */}
               {!isSelectionMode && (
                 <>
                   {/* Hide Footer if Blocked */}
                   {isBlocked ? (
                       <div className="p-4 bg-container z-10 text-center text-sm text-secondary border-t border-gray-800">
                           You blocked this contact. Tap to unblock.
                       </div>
                   ) : (
                     <>
                       {showEmojiPicker && (
                         <div className="absolute bottom-16 left-2 right-2 bg-[#202c33] border border-gray-700 rounded-xl shadow-2xl h-72 flex flex-col z-50 animate-scaleIn overflow-hidden">
                            <div className="p-2 bg-[#202c33] border-b border-gray-700">
                               <div className="bg-[#2a3942] rounded-lg flex items-center px-3 py-1">
                                  <span className="text-secondary mr-2"><SearchIcon /></span>
                                  <input 
                                    className="bg-transparent border-none outline-none text-primary w-full text-sm placeholder-secondary h-8"
                                    placeholder="Search emoji"
                                    value={emojiSearch}
                                    onChange={e => setEmojiSearch(e.target.value)}
                                    autoFocus
                                  />
                               </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-2 grid grid-cols-8 gap-2 content-start">
                               {EMOJI_LIST.filter(e => e.tags.includes(emojiSearch.toLowerCase()) || e.char.includes(emojiSearch)).map(e => (
                                  <button 
                                    key={e.char} 
                                    className="text-2xl w-8 h-8 flex items-center justify-center hover:bg-[#2a3942] rounded transition-colors"
                                    onClick={() => setInput(prev => prev + e.char)}
                                  >
                                    {e.char}
                                  </button>
                               ))}
                            </div>
                         </div>
                       )}
                       
                       {isAttachMenuOpen && (
                           <div className="absolute bottom-16 left-4 bg-container rounded-xl p-4 shadow-2xl flex flex-col gap-4 animate-scaleIn z-50 border border-gray-700">
                               <div className="flex items-center gap-3 cursor-pointer hover:bg-white/5 p-2 rounded-lg" onClick={() => docInputRef.current?.click()}>
                                   <div className="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center shadow-md">
                                       <DocumentIcon />
                                   </div>
                                   <span className="font-medium">Document</span>
                               </div>
                               <div className="flex items-center gap-3 cursor-pointer hover:bg-white/5 p-2 rounded-lg" onClick={() => galleryInputRef.current?.click()}>
                                   <div className="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center shadow-md">
                                       <GalleryIcon />
                                   </div>
                                   <span className="font-medium">Photos & videos</span>
                               </div>
                               <div className="flex items-center gap-3 cursor-pointer hover:bg-white/5 p-2 rounded-lg" onClick={() => cameraInputRef.current?.click()}>
                                   <div className="w-12 h-12 rounded-full bg-pink-100 flex items-center justify-center shadow-md">
                                       <CameraAltIcon />
                                   </div>
                                   <span className="font-medium">Camera</span>
                               </div>
                           </div>
                       )}

                       <input 
                          type="file" 
                          ref={docInputRef} 
                          className="hidden" 
                          accept="*/*" 
                          onChange={(e) => handleFileUpload(e, 'file')}
                       />
                       <input 
                          type="file" 
                          ref={galleryInputRef} 
                          className="hidden" 
                          accept="image/*,video/*" 
                          onChange={(e) => {
                              const file = e.target.files?.[0];
                              if(file?.type.startsWith('video/')) handleFileUpload(e, 'video');
                              else handleFileUpload(e, 'image');
                          }}
                       />
                       <input 
                          type="file" 
                          ref={cameraInputRef} 
                          className="hidden" 
                          accept="image/*" 
                          capture="user" 
                          onChange={(e) => handleFileUpload(e, 'image')}
                       />

                       <div className="p-2 bg-container z-10 flex items-center gap-2">
                          <div className="flex-1 bg-inputPill rounded-full flex items-center px-4 py-2">
                             <span className="text-secondary mr-2 cursor-pointer hover:text-primary transition-colors" onClick={() => setShowEmojiPicker(!showEmojiPicker)}>☺</span>
                             {isRecording ? (
                                <div className="flex-1 text-red-500 font-medium animate-pulse">Recording... {Math.floor(recordingTime/60)}:{(recordingTime%60).toString().padStart(2,'0')}</div>
                             ) : (
                                <input 
                                  value={input} 
                                  onChange={e => {
                                     setInput(e.target.value);
                                     if (!isBlocked) {
                                         set(ref(db, `typing/${chatId}/${currentUser.uid}`), true);
                                         setTimeout(() => set(ref(db, `typing/${chatId}/${currentUser.uid}`), false), 3000);
                                     }
                                  }} 
                                  placeholder="Type a message" 
                                  className="flex-1 bg-transparent border-none outline-none text-primary text-sm placeholder-secondary"
                                  onKeyDown={e => e.key === 'Enter' && sendText()}
                                />
                             )}
                             <span className="text-secondary ml-2 cursor-pointer rotate-45" onClick={() => setIsAttachMenuOpen(!isAttachMenuOpen)}>📎</span>
                          </div>
                          
                          <button 
                             className="w-10 h-10 rounded-full bg-accent flex items-center justify-center text-white shadow-md active:scale-95 transition-transform"
                             onClick={() => {
                                if(input.trim()) {
                                   sendText();
                                } else {
                                   if(isRecording) stopRecording();
                                   else startRecording();
                                }
                             }}
                          >
                             {input.trim() ? <SendIcon /> : (isRecording ? <div className="w-3 h-3 bg-white rounded-sm"></div> : <MicIcon />)}
                          </button>
                       </div>
                     </>
                   )}
                 </>
               )}

               {viewingImage && (
                 <div className="fixed inset-0 z-[60] bg-black flex flex-col items-center justify-center animate-scaleIn">
                    <div className="absolute top-4 right-4 z-50 flex gap-4">
                        <button onClick={() => setImageZoom(z => Math.max(1, z - 0.5))} className="w-10 h-10 bg-gray-800/50 rounded-full text-white flex items-center justify-center text-xl backdrop-blur-sm border border-gray-600">－</button>
                        <button onClick={() => setImageZoom(z => z + 0.5)} className="w-10 h-10 bg-gray-800/50 rounded-full text-white flex items-center justify-center text-xl backdrop-blur-sm border border-gray-600">＋</button>
                        <button onClick={() => setViewingImage(null)} className="w-10 h-10 bg-red-500/80 rounded-full text-white flex items-center justify-center text-lg backdrop-blur-sm">✕</button>
                    </div>
                    <div className="w-full h-full overflow-hidden flex items-center justify-center p-2" onDoubleClick={() => setImageZoom(z => z === 1 ? 2 : 1)}>
                        <img 
                           src={viewingImage} 
                           className="transition-transform duration-200 ease-out max-w-full max-h-full object-contain"
                           style={{ transform: `scale(${imageZoom})`, cursor: 'zoom-in' }}
                        />
                    </div>
                 </div>
               )}
            </div>
          );
        };

        const CallScreen = ({ incoming, isInCall, onAccept, onReject, onEnd, localRef, remoteRef, status, isMuted, onToggleMute, dragHandlers }) => {
           if(incoming && !isInCall) return (
                <div className="absolute inset-0 bg-background/90 z-50 flex flex-col items-center justify-center">
                    <h2 className="text-2xl mb-2 text-primary">{incoming.callerName}</h2>
                    <div className="flex gap-8 mt-8">
                       <button onClick={onReject} className="w-16 h-16 rounded-full bg-red-500 text-2xl flex items-center justify-center">✕</button>
                       <button onClick={onAccept} className="w-16 h-16 rounded-full bg-green-500 text-2xl flex items-center justify-center">📞</button>
                    </div>
                </div>
           );
           return (
             <div className="absolute inset-0 bg-black z-50 flex flex-col">
                <div className="absolute top-10 w-full text-center z-10"><h2 className="text-xl font-semibold text-white">{status}</h2></div>
                <div className="relative flex-1 bg-gray-900 overflow-hidden flex items-center justify-center">
                   <video ref={remoteRef} autoPlay playsInline className="w-full h-full object-cover" />
                   <video ref={localRef} autoPlay playsInline muted className="absolute w-[100px] h-[150px] bg-gray-800 border border-gray-600 rounded-lg object-cover cursor-grab z-20 shadow-lg" style={{ bottom: '120px', right: '20px', ...dragHandlers.style }}
                      onMouseDown={dragHandlers.onMouseDown} onTouchStart={dragHandlers.onTouchStart} onMouseMove={dragHandlers.onMouseMove} onTouchMove={dragHandlers.onTouchMove} onMouseUp={dragHandlers.onMouseUp} onTouchEnd={dragHandlers.onTouchEnd}
                   />
                </div>
                <div className="h-[100px] bg-black/80 flex items-center justify-center gap-6 absolute bottom-0 w-full z-30">
                   <button onClick={onToggleMute} className={`w-12 h-12 rounded-full text-xl flex items-center justify-center ${isMuted ? 'bg-red-500' : 'bg-gray-700'} text-white`}>🎤</button>
                   <button onClick={onEnd} className="w-12 h-12 rounded-full bg-red-600 text-xl flex items-center justify-center text-white">📞</button>
                </div>
             </div>
           );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
