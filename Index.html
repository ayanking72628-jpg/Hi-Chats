        // --- Async Media Component for Chunked Files ---
        const AsyncMedia = ({ message, isSelectionMode, onViewImage }) => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (message.isChunked && message.fileId) {
                    get(ref(db, `fileChunks/${message.fileId}`)).then(snap => {
                        if (snap.exists()) {
                            const chunks = snap.val();
                            // Sort chunks by index to ensure correct order
                            const sortedData = Object.keys(chunks)
                                .sort((a, b) => parseInt(a) - parseInt(b))
                                .map(key => chunks[key])
                                .join('');
                            setData(sortedData);
                        }
                        setLoading(false);
                    }).catch(err => {
                        console.error("Error loading chunks", err);
                        setLoading(false);
                    });
                } else {
                    setData(message.imageUrl || message.videoUrl);
                    setLoading(false);
                }
            }, [message]);

            if (loading) return (
                <div className="w-48 h-32 flex flex-col items-center justify-center bg-black/20 rounded-lg">
                    <div className="w-8 h-8 border-4 border-accent border-t-transparent rounded-full animate-spin mb-2"></div>
                    <span className="text-xs text-secondary">Loading media...</span>
                </div>
            );

            const isVideo = message.fileType === 'video' || !!message.videoUrl;

                    <div className="max-w-xs bg-black rounded-lg overflow-hidden">
                        <video 
                            src={data} 
                            controls={!isSelectionMode} 
                            playsInline 
                            className="w-full max-h-[300px]" 
                        />
                    </div>
                );
            }
            
            // Image

                <div className="max-w-xs cursor-pointer hover:opacity-90 transition-opacity" onClick={() => !isSelectionMode && onViewImage && onViewImage(data)}>

            );

          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" className="text-secondary hover:text-primary"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"></path></svg>
        );
        const TrashIcon = ({ className }) => (
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" className={className}><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        );
        const CopyIcon = ({ className }) => (
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" className={className}><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        );
        const StarIcon = ({ className }) => (
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" className={className}><path d="M22 9.24l-7.19-.62L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03L22 9.24zM12 15.4l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.71 4.04 4.38.38-3.32 2.88 1 4.28L12 15.4z"/></svg>
        );
        const StarFilledIcon = ({ className }) => (
          <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" className={className}><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        );
        const BlockIcon = ({ className }) => (
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" className={className} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line></svg>
        );

        // Helper: Generate DP
        const emojiToSVG = (content) => {
          const text = (content || "?").substring(0, 2);
          const svgString = `
          <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
              <rect width="100" height="100" fill="#202c33"/>
              <text x="50" y="55" font-family="Arial" font-size="50" fill="#e9edef" text-anchor="middle" dominant-baseline="middle">${text}</text>
          </svg>`;
          return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgString)));
        };

        const generateUniqueId = () => 'ar-' + Math.floor(1000 + Math.random() * 9000);

        // WebRTC Config
        const rtcConfig = {
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        };

        // --- Custom Calendar Component ---
        const CustomCalendar = ({ isOpen, onClose, onSelect, minDate, maxDate }) => {
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(null);

            useEffect(() => {
                if (isOpen) {
                    setCurrentMonth(new Date()); // Reset to today when opened
                }
            }, [isOpen]);

            if (!isOpen) return null;

            const daysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const firstDayOfMonth = (year, month) => {
                let day = new Date(year, month, 1).getDay();
                return day === 0 ? 6 : day - 1; // Adjust for Mon=0, Sun=6
            };

            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const totalDays = daysInMonth(year, month);
            const startDay = firstDayOfMonth(year, month);
            
            const today = new Date();
            const isSameDay = (d1, d2) => d1.getDate() === d2.getDate() && d1.getMonth() === d2.getMonth() && d1.getFullYear() === d2.getFullYear();

            const renderDays = () => {
                let days = [];
                // Padding
                for (let i = 0; i < startDay; i++) {
                    days.push(<div key={`pad-${i}`} className="w-8 h-8"></div>);
                }
                // Days
                for (let i = 1; i <= totalDays; i++) {
                    const date = new Date(year, month, i);
                    const isToday = isSameDay(date, today);
                    const isSelected = selectedDate && isSameDay(date, selectedDate);
                    
                    days.push(
                        <div 
                            key={i} 
                            onClick={() => {
                                setSelectedDate(date);
                                // Format for search: YYYY-MM-DD
                                const y = date.getFullYear();
                                const m = String(date.getMonth() + 1).padStart(2, '0');
                                const d = String(date.getDate()).padStart(2, '0');
                                onSelect(`${y}-${m}-${d}`);
                                onClose();
                            }}
                            className={`w-8 h-8 flex items-center justify-center text-sm rounded-full cursor-pointer transition-colors
                                ${isSelected ? 'bg-white text-black font-bold' : 'text-primary hover:bg-[#2a3942]'}
                                ${isToday && !isSelected ? 'text-[#00a884] font-bold border border-[#00a884]' : ''}
                            `}
                        >
                            {i}
                        </div>
                    );
                }
                return days;
            };

            const prevMonth = () => {
                const next = new Date(currentMonth);
                next.setMonth(currentMonth.getMonth() - 1);
                if (next >= minDate) setCurrentMonth(next);
            };

            const nextMonth = () => {
                const next = new Date(currentMonth);
                next.setMonth(currentMonth.getMonth() + 1);
                if (next <= maxDate) setCurrentMonth(next);
            };

            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            return (
                <div className="absolute inset-0 z-[60] bg-black/50 backdrop-blur-sm flex items-center justify-center animate-scaleIn" onClick={onClose}>
                    <div className="bg-[#202c33] p-4 rounded-xl shadow-2xl w-[320px] border border-gray-700" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-4 text-primary">
                            <button onClick={prevMonth} className={`p-1 hover:bg-[#2a3942] rounded-full ${currentMonth <= minDate ? 'opacity-30 cursor-not-allowed' : ''}`}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                            </button>
                            <span className="font-semibold text-lg">{monthNames[month]} {year}</span>
                            <button onClick={nextMonth} className={`p-1 hover:bg-[#2a3942] rounded-full ${currentMonth >= maxDate ? 'opacity-30 cursor-not-allowed' : ''}`}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                            </button>
                        </div>
                        <div className="grid grid-cols-7 gap-1 text-center mb-2">
                            {['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'].map(d => <span key={d} className="text-xs text-secondary font-medium">{d}</span>)}
                        </div>
                        <div className="grid grid-cols-7 gap-1 place-items-center">
                            {renderDays()}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
          const [currentUser, setCurrentUser] = useState(null);
          const [userProfile, setUserProfile] = useState(null);
          const [loading, setLoading] = useState(true);
          const [view, setView] = useState('auth');

          // Main View Tabs
          const [activeTab, setActiveTab] = useState('contacts');
          
          // Data
          const [contacts, setContacts] = useState([]);
          const [requests, setRequests] = useState([]);
          const [callLogs, setCallLogs] = useState([]);

          // Search
          const [searchTerm, setSearchTerm] = useState('');

          // Chat
          const [currentChatId, setCurrentChatId] = useState(null);
          const [currentChatUser, setCurrentChatUser] = useState(null);
          
          // Calls
          const [incomingCall, setIncomingCall] = useState(null);
          const [isInCall, setIsInCall] = useState(false);
          const [callStatus, setCallStatus] = useState('');
          const [isMuted, setIsMuted] = useState(false);
          const currentCallType = useRef('voice');
          
          // Side Menu Image Upload
          const sideMenuFileRef = useRef(null);

          // Refs for WebRTC
          const localVideoRef = useRef(null);
          const remoteVideoRef = useRef(null);
          const peerConnectionRef = useRef(null);
          const localStreamRef = useRef(null);
          const toneOscillatorRef = useRef(null);
          const iceCandidatesQueue = useRef([]);
          
          // Draggable Local Video
          const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
          const dragRef = useRef({
            isDragging: false, startX: 0, startY: 0, initialX: 0, initialY: 0
          });

          // Badge Counts Calculations
          const totalUnreadMessages = contacts.reduce((sum, c) => sum + (c.unreadCount || 0), 0);
          const totalRequests = requests.length;
          const totalMissedCalls = callLogs.filter(log => log.duration === '0:00').length;

          // HELPER: Clear State
          const clearState = () => {
             setContacts([]);
             setRequests([]);
             setCallLogs([]);
             setCurrentChatId(null);
             setCurrentChatUser(null);
             setIncomingCall(null);
             setIsInCall(false);
             setCallStatus('');
             if(toneOscillatorRef.current) {
                try { toneOscillatorRef.current.stop(); toneOscillatorRef.current.dispose(); } catch(e){}
                toneOscillatorRef.current = null;
             }
          };

          // Auth Listener
          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, async (user) => {
              // Always clear previous user data first to avoid bleed-through
              clearState();

              if (user) {
                setCurrentUser(user);
                const snapshot = await get(child(ref(db), `users/${user.uid}`));
                if (snapshot.exists()) {
                  setUserProfile(snapshot.val());
                  setView('main');
                  setupPresence(user.uid);
                  loadAppData(user.uid);
                } else {
                  setView('setup');
                }
              } else {
                setCurrentUser(null);
                setUserProfile(null);
                setView('auth');
              }
              setLoading(false);
            });
            return () => unsubscribe();
          }, []);

          const setupPresence = (uid) => {
            const userStatusRef = ref(db, `/users/${uid}/status`);
            const connectedRef = ref(db, '.info/connected');
            onValue(connectedRef, (snap) => {
              if (snap.val() === true) {
                onDisconnect(userStatusRef).set({state: 'offline', last_changed: serverTimestamp()})
                .then(() => {
                  set(userStatusRef, {state: 'online', last_changed: serverTimestamp()});
                });
              }
            });
          };

          const loadAppData = (uid) => {
            // Contacts
            onValue(ref(db, `contacts/${uid}`), (snapshot) => {
              if (!snapshot.exists()) {
                  setContacts([]);
                  return;
              }
              const loadedContacts = [];
              snapshot.forEach((childSnap) => {
                const friendUid = childSnap.key;
                const chatId = childSnap.val().chatId;
                // Fetch details (simplified nested fetch for React)
                get(ref(db, `users/${friendUid}`)).then((uSnap) => {
                    const uData = uSnap.val();
                    if(uData) {
                       onValue(ref(db, `unreadCounts/${uid}/${chatId}`), (cSnap) => {
                         const unread = cSnap.val() || 0;
                         onValue(ref(db, `users/${friendUid}/status`), (sSnap) => {
                           const status = sSnap.val()?.state || 'offline';
                           setContacts(prev => {
                             const filtered = prev.filter(c => c.uid !== friendUid);
                             return [...filtered, {
                               uid: friendUid,
                               chatId,
                               name: uData.name,
                               dpUrl: uData.dpUrl,
                               status,
                               unreadCount: unread
                             }].sort((a,b) => a.name.localeCompare(b.name));
                           });
                         });
                       });
                    }
                });
              });
            });

            // Requests
            onValue(ref(db, `requests/${uid}`), (snapshot) => {
              if(!snapshot.exists()) {
                  setRequests([]);
                  return;
              }
              const reqs = [];
              snapshot.forEach(c => {
                const rUid = c.key;
                get(ref(db, `users/${rUid}`)).then(u => {
                  setRequests(prev => {
                     const exist = prev.find(p => p.uid === rUid);
                     if(exist) return prev;
                     return [...prev, { uid: rUid, ...u.val() }];
                  });
                });
              });
            });

            // Calls Listener
            onValue(ref(db, `calls/${uid}`), (snapshot) => {
              const data = snapshot.val();
              if(data && data.type === 'offer' && !isInCall) {
                setIncomingCall({ ...data, key: snapshot.key });
              } else if (!data) {
                setIncomingCall(null);
                // Stop ringtone if call cancelled remotely
                if(toneOscillatorRef.current) { 
                   try {
                     toneOscillatorRef.current.stop(); 
                     toneOscillatorRef.current.dispose(); 
                   } catch(e) {}
                   toneOscillatorRef.current = null; 
                }
              }
            });

            // Call Logs
            onValue(query(ref(db, `callLogs/${uid}`), limitToLast(20)), (snap) => {
               const logs = [];
               snap.forEach(c => { logs.push(c.val()); });
               setCallLogs(logs.reverse());
            });
          };

          // Ringtone Management
          useEffect(() => {
            if (incomingCall && !isInCall) {
               // Start Ringtone logic
               if (typeof Tone !== 'undefined') {
                  try {
                     if(Tone.context.state !== 'running') Tone.context.resume();
                     const osc = new Tone.Oscillator(440, "sine").toDestination().start();
                     osc.volume.value = -10;
                     toneOscillatorRef.current = osc;
                  } catch(e) { console.log("Ringtone blocked", e); }
               }
            } else {
               // Cleanup if call answered or ended
               if (toneOscillatorRef.current) {
                  try {
                    toneOscillatorRef.current.stop();
                    toneOscillatorRef.current.dispose();
                  } catch(e) {}
                  toneOscillatorRef.current = null;
               }
            }
          }, [incomingCall, isInCall]);

          // Fix for local video attachment race condition
          useEffect(() => {
            if (isInCall && localVideoRef.current && localStreamRef.current) {
               localVideoRef.current.srcObject = localStreamRef.current;
               const videoTracks = localStreamRef.current.getVideoTracks();
               if (videoTracks.length === 0 || videoTracks.every(t => !t.enabled)) {
                   localVideoRef.current.style.opacity = '0';
               } else {
                   localVideoRef.current.style.opacity = '1';
               }
            }
          }, [isInCall]);

          // --- Handlers ---
          const handleDragStart = (e) => {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            dragRef.current = {
              isDragging: true,
              startX: clientX,
              startY: clientY,
              initialX: dragPos.x,
              initialY: dragPos.y
            };
          };

          const handleDragMove = (e) => {
            if (!dragRef.current.isDragging) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            setDragPos({
              x: dragRef.current.initialX + (clientX - dragRef.current.startX),
              y: dragRef.current.initialY + (clientY - dragRef.current.startY)
            });
          };

          const handleDragEnd = () => { dragRef.current.isDragging = false; };
          
          const handleSideMenuFileSelect = (e) => {
            const file = e.target.files?.[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 300; 
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > MAX_SIZE) {
                            height *= MAX_SIZE / width;
                            width = MAX_SIZE;
                        }
                    } else {
                        if (height > MAX_SIZE) {
                            width *= MAX_SIZE / height;
                            height = MAX_SIZE;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
                    
                    update(ref(db, `users/${currentUser.uid}`), { dpUrl: dataUrl });
                    setUserProfile(prev => ({ ...prev, dpUrl: dataUrl }));
                };
                img.src = event.target.result;
              };
              reader.readAsDataURL(file);
            }
          };

          // --- Render ---
          if (loading) return (
            <div className="flex flex-col h-screen items-center justify-center bg-background">
                <div className="relative">
                    <div className="w-16 h-16 border-4 border-container rounded-full"></div>
                    <div className="absolute top-0 left-0 w-16 h-16 border-4 border-accent border-t-transparent rounded-full animate-spin"></div>
                </div>
                <div className="mt-4 text-accent font-medium animate-pulse">Loading Hi Chats...</div>
            </div>
          );
          if (view === 'auth') return <AuthView onLogin={() => {}} />;
          if (view === 'setup') return (
             <ProfileSetupView 
                user={currentUser} 
                onComplete={(profile) => {
                    setUserProfile(profile);
                    setView('main');
                    setupPresence(currentUser.uid);
                    loadAppData(currentUser.uid);
                }} 
             />
          );

          return (
            <div className="flex flex-col h-screen max-w-md mx-auto bg-background relative overflow-hidden shadow-2xl">
              {/* Header */}
              <header className="flex justify-between items-center p-4 bg-container shadow-sm z-10 text-primary">
                <div className="flex items-center gap-2">
                  <button onClick={() => document.getElementById('side-menu')?.classList.toggle('translate-x-[-100%]')} className="text-xl">☰</button>
                  <span className="font-semibold text-lg">Hi Chats</span>
                </div>
                <button 
                  onClick={() => document.getElementById('add-friend-modal')?.classList.remove('hidden')} 
                  className="w-9 h-9 rounded-full flex items-center justify-center bg-inputPill border border-gray-700 hover:bg-container transition-all"
                >
                  <span className="text-xl font-light text-accent pb-0.5">+</span>
                </button>
              </header>

              {/* Main Content */}
              <main className="flex-1 overflow-y-auto relative bg-background">
                {activeTab === 'contacts' && (
                  <div className="flex flex-col">
                     {/* Search Bar - Fixed with Gradient Border */}
                     <div className="px-4 py-3 sticky top-0 bg-background z-20">
                        <div className={`rounded-full p-[1.5px] ${GRADIENT_BORDER_CLASS} shadow-lg`}>
                           <div className="relative bg-inputPill rounded-full flex items-center p-2">
                              <span className="text-secondary ml-2 mr-2"><SearchIcon /></span>
                              <input 
                                  type="text" 
                                  placeholder="Search..."
                                  className="bg-transparent border-none outline-none text-primary w-full text-sm placeholder-secondary"
                                  value={searchTerm}
                                  onChange={e => setSearchTerm(e.target.value)}
                              />
                           </div>
                        </div>
                     </div>

                     {contacts
                       .filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()))
                       .map(c => (
                       <div key={c.uid} onClick={() => { setCurrentChatId(c.chatId); setCurrentChatUser(c); }} className="flex items-center p-4 border-b border-container cursor-pointer hover:bg-container transition">
                         <img src={c.dpUrl} className="w-12 h-12 rounded-full mr-4 bg-gray-800 object-cover" alt="dp" />
                         <div className="flex-1">
                           <div className="font-medium text-primary">{c.name}</div>
                           <div className="text-xs text-secondary">{c.status === 'online' ? 'Online' : 'Offline'}</div>
                         </div>
                         {c.unreadCount > 0 && <span className="bg-accent text-black text-xs font-bold px-2 py-1 rounded-full">{c.unreadCount}</span>}
                       </div>
                     ))}
                     {contacts.length === 0 && <div className="p-8 text-center text-secondary">No contacts yet. Add friends!</div>}
                  </div>
                )}
                {activeTab === 'requests' && (
                   <div className="flex flex-col">
                      <div className="p-4 text-secondary text-sm">Friend Requests</div>
                      {requests.map(r => (
                         <div key={r.uid} className="flex justify-between items-center p-4 border-b border-container">
                           <div className="flex items-center gap-3">
                              <img src={r.dpUrl} className="w-8 h-8 rounded-full" alt="dp" />
                              <span className="text-primary">{r.name}</span>
                           </div>
                           <div className="flex gap-2">
                              <button onClick={() => {
                                  const chatId = [currentUser.uid, r.uid].sort().join('_');
                                  const updates = {};
                                  updates[`contacts/${currentUser.uid}/${r.uid}`] = { chatId };
                                  updates[`contacts/${r.uid}/${currentUser.uid}`] = { chatId };
                                  updates[`requests/${currentUser.uid}/${r.uid}`] = null;
                                  update(ref(db), updates);
                              }} className={REQUEST_BTN_CLASS}>✓</button>
                              <button onClick={() => set(ref(db, `requests/${currentUser.uid}/${r.uid}`), null)} className={REQUEST_BTN_CLASS}>✕</button>
                           </div>
                         </div>
                      ))}
                   </div>
                )}
                {activeTab === 'calls' && (
                  <div className="flex flex-col">
                    <div className="p-4 text-secondary text-sm">Call History</div>
                    {callLogs.map((log, i) => {
                      // Logic for Missed Call styling
                      const isMissed = log.duration === '0:00';
                      return (
                        <div key={i} className="flex items-center p-4 border-b border-container text-primary">
                          <div className={`text-2xl mr-4 ${isMissed ? 'text-red-500' : 'text-secondary'}`}>
                             {log.type === 'video' ? '📹' : '📞'}
                          </div>
                          <div>
                            <div className={`text-sm uppercase font-medium ${isMissed ? 'text-red-500' : ''}`}>
                               {isMissed ? `Missed ${log.type} call` : `${log.type} - ${log.duration}`}
                            </div>
                            <div className="text-xs text-secondary">{new Date(log.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </main>

              {/* Bottom Nav with Gradient Text for Active Tab */}
              <nav className="h-[60px] bg-container flex justify-around items-center border-t border-gray-800">
                 <div onClick={() => setActiveTab('contacts')} className={`relative flex flex-col items-center cursor-pointer transition-transform ${activeTab === 'contacts' ? 'scale-110' : 'text-secondary'}`}>
                   <span className={`text-xl ${activeTab === 'contacts' ? GRADIENT_TEXT_CLASS : ''}`}>💬</span>
                   <span className={`text-[10px] ${activeTab === 'contacts' ? GRADIENT_TEXT_CLASS : ''}`}>Chats</span>
                   {totalUnreadMessages > 0 && (
                      <span className="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 rounded-full min-w-[18px] text-center border-2 border-container">
                        {totalUnreadMessages}
                      </span>
                   )}
                 </div>
                 <div onClick={() => setActiveTab('requests')} className={`relative flex flex-col items-center cursor-pointer transition-transform ${activeTab === 'requests' ? 'scale-110' : 'text-secondary'}`}>
                   <span className={`text-xl ${activeTab === 'requests' ? GRADIENT_TEXT_CLASS : ''}`}>👥</span>
                   <span className={`text-[10px] ${activeTab === 'requests' ? GRADIENT_TEXT_CLASS : ''}`}>Requests</span>
                   {totalRequests > 0 && (
                      <span className="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 rounded-full min-w-[18px] text-center border-2 border-container">

          // --- Functions ---
          async function startCall(video, targetUid, myUid) {
            currentCallType.current = video ? 'video' : 'voice';
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
              alert("Media devices not supported. Please use a secure connection (HTTPS) or localhost.");
              return;
            }

            // Check if blocked before starting call (Basic check, ideal world check DB too)
            const blockedSnap = await get(ref(db, `blocked/${myUid}/${targetUid}`));
            if(blockedSnap.exists() && blockedSnap.val()) {
                alert("You have blocked this contact. Unblock to call.");
                return;
            }

            setIsInCall(true);
            setCallStatus('Calling...');
            try {
              const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: video });
              localStreamRef.current = stream;
              if(localVideoRef.current) localVideoRef.current.srcObject = stream;
              if(!video && localVideoRef.current) localVideoRef.current.style.opacity = '0';
            } catch(e) { 
                console.warn("Media access failed:", e.message);
                let msg = "Permission denied. Please allow microphone/camera access.";
                alert(msg); 
                setIsInCall(false); 
                return; 
            }

            const pc = new RTCPeerConnection(rtcConfig);
            peerConnectionRef.current = pc;
            iceCandidatesQueue.current = [];

            localStreamRef.current.getTracks().forEach(t => pc.addTrack(t, localStreamRef.current));
            
            pc.ontrack = (event) => { 
                if(remoteVideoRef.current) remoteVideoRef.current.srcObject = event.streams[0]; 
            };
            
            pc.onicecandidate = (event) => { 
                if(event.candidate) {
                    push(ref(db, `calls/${targetUid}/callerCandidates`), event.candidate.toJSON()); 
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            set(ref(db, `calls/${targetUid}`), {
               callerId: myUid, 
               callerName: userProfile?.name, 
               type: 'offer', 
               sdp: offer.sdp, 
               callType: video ? 'video' : 'voice', 
               callRoomId: myUid
            });

            onValue(ref(db, `calls/${targetUid}/answer`), async (snap) => {
                const data = snap.val();
                if(data && pc.signalingState === 'have-local-offer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(data));
                    setCallStatus('Connected');
                    iceCandidatesQueue.current.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)));
                    iceCandidatesQueue.current = [];
                }
            });

            onValue(ref(db, `calls/${targetUid}/candidates`), snap => { 
                snap.forEach(c => { 
                    const candidateVal = c.val();
                    if (pc.remoteDescription && pc.remoteDescription.type) {
                        pc.addIceCandidate(new RTCIceCandidate(candidateVal));
                    } else {
                        iceCandidatesQueue.current.push(candidateVal);
                    }
                }); 
            });
          }

          async function handleIncomingCall(data) {
             const isVideo = data.callType === 'video';
             currentCallType.current = isVideo ? 'video' : 'voice';
             
             if(toneOscillatorRef.current) { 
               try {
                 toneOscillatorRef.current.stop(); 
                 toneOscillatorRef.current.dispose(); 
               } catch(e) {}
               toneOscillatorRef.current = null; 
             }
             
             setIncomingCall(null);
             setIsInCall(true);
             setCallStatus('Connecting...');
             iceCandidatesQueue.current = [];
             
             try {
               if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                  throw new Error("MediaDevices not supported");
               }
               const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
               localStreamRef.current = stream;
               if(localVideoRef.current) localVideoRef.current.srcObject = stream;
               if(!isVideo && localVideoRef.current) localVideoRef.current.style.opacity = '0';
             } catch(e) { 
                console.warn("Incoming Call Media Error:", e.message);
                alert("Could not access Camera/Mic. Please check permissions and ensure secure context.");
                setIsInCall(false);
                setIncomingCall(null);
                return; 
             }

             const pc = new RTCPeerConnection(rtcConfig);
             peerConnectionRef.current = pc;
             localStreamRef.current.getTracks().forEach(t => pc.addTrack(t, localStreamRef.current));
             
             pc.ontrack = event => { if(remoteVideoRef.current) remoteVideoRef.current.srcObject = event.streams[0]; };
             
             // Fixed: Send candidates to the path the caller is listening to (calls/{currentUser.uid}/candidates)
             pc.onicecandidate = event => { 
                 if(event.candidate) push(ref(db, `calls/${currentUser.uid}/candidates`), event.candidate.toJSON()); 
             };

             await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: data.sdp }));
             
             iceCandidatesQueue.current.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)));
             iceCandidatesQueue.current = [];

             const answer = await pc.createAnswer();
             await pc.setLocalDescription(answer);
             
             update(ref(db, `calls/${currentUser.uid}`), { answer: { type: 'answer', sdp: answer.sdp } });
             
             onValue(ref(db, `calls/${currentUser.uid}/callerCandidates`), snap => { 
                 snap.forEach(c => { 
                     const candidateVal = c.val();
                     if (pc.remoteDescription && pc.remoteDescription.type) {
                         pc.addIceCandidate(new RTCIceCandidate(candidateVal));
                     } else {
                         iceCandidatesQueue.current.push(candidateVal);
                     }
                 }); 
             });
             
             setCallStatus('Connected');
          }

          function endCall() {
            if(peerConnectionRef.current) {
                peerConnectionRef.current.close();
                peerConnectionRef.current = null;
            }
            if(localStreamRef.current) {
                localStreamRef.current.getTracks().forEach(t => t.stop());
                localStreamRef.current = null;
            }
            if(toneOscillatorRef.current) {
                try {
                    toneOscillatorRef.current.stop();
                    toneOscillatorRef.current.dispose();
                } catch(e) {}
                toneOscillatorRef.current = null;
            }
            
            setIsInCall(false);
            setIncomingCall(null);
            setCallStatus('');
            iceCandidatesQueue.current = [];
            
            set(ref(db, `calls/${currentUser.uid}`), null);
            if(currentChatUser) set(ref(db, `calls/${currentChatUser.uid}`), null);
            
            // Correctly push video or voice type to history
            push(ref(db, `callLogs/${currentUser.uid}`), { type: currentCallType.current, duration: '0:00', timestamp: serverTimestamp() });
          }
        }

              const reader = new FileReader();
              reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    // Resize to manageable size for RTDB (e.g. 300x300)
                    const MAX_SIZE = 300; 
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) {
                            height *= MAX_SIZE / width;
                            width = MAX_SIZE;
                        }
                    } else {
                        if (height > MAX_SIZE) {
                            width *= MAX_SIZE / height;
                            height = MAX_SIZE;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Compress to JPEG 0.7 quality
                    const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
                    setDpUrl(dataUrl);
                    setProcessing(false);
